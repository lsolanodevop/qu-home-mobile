# ==========================================================================
# Appium / device configuration.
# Values here can be overridden from the command line via -D<key>=<value>,
# e.g.  mvn test -DappPath=./apps/app-home-test-mobile.apk
# ==========================================================================

# Appium server
appiumServerUrl=http://127.0.0.1:4723

# Device / platform
platformName=Android
automationName=UiAutomator2
# Leave deviceName/udid to match whatever emulator/device is connected,
# or set them explicitly (e.g. "Pixel_7_API_34" / "emulator-5554").
deviceName=Android Device
platformVersion=

# Application under test (relative to project root or absolute path)
appPath=./apps/app-home-test-mobile.apk

# Session behaviour
autoGrantPermissions=true
noReset=false
fullReset=false
newCommandTimeout=120

# Test credentials (from the challenge README)
validEmail=johndoe@email.com
validPassword=123
