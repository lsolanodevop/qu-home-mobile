name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Compiles the project and checks that every Gherkin step is defined,
      # without needing an emulator or Appium server.
      - name: Compile and validate feature steps
        run: mvn -B test -Dtest=DryRunTestRunner
